<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        p{
            font-size:1.1rem;
            margin-bottom:25px;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:white;
            color:#764ba2;
            font-size:1rem;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome!</h1>
        <p>Glad to have you here.</p>
        <button onclick="showMessage()">
            Get Started
        </button>
    </div>

    <script>
        function showMessage(){
            alert("Welcome to the website!");
        }
    </script>

</body>
</html>
